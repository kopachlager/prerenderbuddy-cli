name: Feature request
description: Propose a focused local diagnostic improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Observable problem
      description: Explain what cannot be diagnosed today and who needs it.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or public example
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed local behaviour
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundary
      options:
        - label: This does not require a hosted browser farm, proxy, DNS, billing, crawler routing, or private production access.
          required: true
